# Backend-only repository: this file is under backend/.github/workflows/ (committable when git root = backend).
#
# Secrets: DOCKER_USERNAME, DOCKER_PASSWORD, EC2_IP, EC2_KEY
# Optional: EC2_USER, EC2_DEPLOY_DIR (default /home/<user>/dating-app), EC2_SSH_KNOWN_HOSTS
# EC2 must have docker, compose, and this repo (or a copy) checked out to EC2_DEPLOY_DIR
# with docker-compose.prod.yml (in this folder) and a .env file.

name: Deploy Backend

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE: yannainghtwe/youme-backend:latest

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest

    steps:
      # 📥 Checkout code
      - name: Checkout
        uses: actions/checkout@v4

      # 🐳 Build Docker image
      - name: Build image
        run: |
          docker build -t $IMAGE .

      # 🔐 Login to Docker Hub
      - name: Login Docker Hub
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # 📦 Push image
      - name: Push image
        run: |
          docker push $IMAGE

      # 🔑 Setup SSH
      - name: Install SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      # 🚀 Deploy to EC2
      - name: Deploy on EC2
        run: |
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no "${{ secrets.EC2_USER }}@${{ secrets.EC2_IP }}" << 'EOF'
            set -e

            echo "📂 Go to project directory"
            cd ~/dating-app

            echo "🐳 Pull latest backend image"
            docker pull yannainghtwe/youme-backend:latest

            echo "🚀 Restart backend container"
            docker compose -f docker-compose.prod.yml up -d --no-deps backend

            echo "🧹 Cleanup old images (optional)"
            docker image prune -f

            echo "✅ Backend deployed successfully"
          EOF
