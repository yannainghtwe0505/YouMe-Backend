# Backend-only repository: this file is under backend/.github/workflows/ (committable when git root = backend).
#
# Secrets: DOCKER_USERNAME, DOCKER_PASSWORD, EC2_IP, EC2_KEY
# Optional: EC2_USER, EC2_DEPLOY_DIR (default /home/<user>/dating-app), EC2_SSH_KNOWN_HOSTS
# EC2 must have docker, compose, and this repo (or a copy) checked out to EC2_DEPLOY_DIR
# with docker-compose.prod.yml (in this folder) and a .env file.

name: Deploy Backend

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-backend
  cancel-in-progress: true

env:
  IMAGE: yannainghtwe/youme-backend:latest

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        run: |
          docker build -t "$IMAGE" -f Dockerfile .
          docker push "$IMAGE"

      - name: Install SSH key
        env:
          EC2_SSH_KNOWN_HOSTS: ${{ secrets.EC2_SSH_KNOWN_HOSTS }}
        run: |
          mkdir -p ~/.ssh
          umask 077
          echo "${{ secrets.EC2_KEY }}" > ~/.ssh/id_rsa
          if [ -n "$EC2_SSH_KNOWN_HOSTS" ]; then
            echo "$EC2_SSH_KNOWN_HOSTS" >> ~/.ssh/known_hosts
          fi

      - name: Deploy on EC2
        env:
          EC2_USER_IN: ${{ secrets.EC2_USER }}
          EC2_DEPLOY_IN: ${{ secrets.EC2_DEPLOY_DIR }}
        run: |
          set -e
          EC2_USER="${EC2_USER_IN:-ec2-user}"
          DEPLOY_DIR="${EC2_DEPLOY_IN:-/home/${EC2_USER}/dating-app}"
          REMOTE="cd $DEPLOY_DIR && docker pull $IMAGE && (docker compose -f docker-compose.prod.yml up -d --no-build backend || docker-compose -f docker-compose.prod.yml up -d --no-build backend)"
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no "${EC2_USER}@${{ secrets.EC2_IP }}" "$REMOTE"
        shell: bash
