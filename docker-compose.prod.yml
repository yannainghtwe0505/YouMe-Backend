# Full stack: Postgres + backend + frontend images from Docker Hub.
# Keep in sync with frontend/docker-compose.prod.yml and repo-root docker-compose.prod.yml when using a monorepo.
#
# On EC2: git pull this repository (or copy this file) into EC2_DEPLOY_DIR, add .env, then:
#   docker compose -f docker-compose.prod.yml pull
#   docker compose -f docker-compose.prod.yml up -d
#
# Required in .env at minimum: POSTGRES_PASSWORD, JWT_SECRET, plus S3/Stripe/AI as needed
# (see src/main/resources/application.yml).

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-DatingAppDB}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-DatingAppDB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U DatingAppDB -d DatingAppDB"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    image: yannainghtwe/youme-backend:latest
    pull_policy: always
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-8090}:8090"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      SERVER_PORT: "8090"
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${SPRING_JPA_HIBERNATE_DDL_AUTO:-update}
      DATABASE_HOST: postgres
      DATABASE_PORT: "5432"
      DATABASE_NAME: ${POSTGRES_DB:-DatingAppDB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-DatingAppDB}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      APP_API_PUBLIC_BASE_URL: ${APP_API_PUBLIC_BASE_URL:-http://localhost:8090}
      APP_FRONTEND_BASE_URL: ${APP_FRONTEND_BASE_URL:-http://localhost}
    restart: unless-stopped

  frontend:
    image: yannainghtwe/youme-frontend:latest
    pull_policy: always
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-80}:80"
    restart: unless-stopped

volumes:
  pgdata:
