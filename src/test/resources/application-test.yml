spring:
  sql:
    init:
      # data.sql targets PostgreSQL seed rows; H2 + ddl-auto would run inserts before tables exist.
      mode: never
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driverClassName: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate.dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false
logging.level.org.hibernate.SQL: off

app:
  urls:
    api-public-base-url: "https://api.test.example"
    frontend-base-url: "https://app.test.example"
    cors-allowed-origin-patterns: "*"
  registration:
    log-otp: true
  s3:
    bucket: test-bucket
    region: us-east-1
    access-key-id: ${AWS_ACCESS_KEY:test}
    secret-access-key: ${AWS_SECRET_KEY:test}
  media:
    public-base-url: "https://example.com"
    presigned-get:
      enabled: false
