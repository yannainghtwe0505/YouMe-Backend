# =============================================================================
# TEMPLATE — copy to application-local.yml (same folder as pom.xml):
#
#   cp application-local.example.yml application-local.yml
#
# application-local.yml is gitignored. Use environment variables in CI/Docker/prod.
#
# Serverless presign: for production, set env MEDIA_PRESIGN_SERVERLESS_ONLY=true on the API
# and VITE_PRESIGN_API_URL on the SPA; presign is deployed from a separate serverless Git repo
# (same JWT secret as app.jwt.secret).
#
# application.yml only has ${ENV:} placeholders. Spring merges YAML maps: if you set
# app.ai.enabled here but omit app.ai.api-key, the key stays empty from the base file.
# So copy every sibling field you need (full app.s3.*, app.subscription.*, etc.)
# or set the matching environment variables instead.
#
# Imports (both optional): ./application-local.yml and ./backend/application-local.yml
# so the file is found whether the process cwd is backend/ or the repo root.
# =============================================================================

# ---------------------------------------------------------------------------
# QUICK START (minimal runnable local stack: Postgres + JWT + AI off)
# ---------------------------------------------------------------------------
spring:
  datasource:
    password: your-postgres-password

app:
  jwt:
    secret: "paste-output-of: openssl rand -base64 48"
  ai:
    enabled: false
  registration:
    dev-otp: "123456"
    log-otp: true
  subscription:
    stripe-enabled: false
  s3:
    bucket: your-s3-bucket-name
  media:
    presigned-get:
      enabled: false
  urls:
    api-public-base-url: "http://localhost:8090"
    frontend-base-url: "http://localhost:5173"

# ---------------------------------------------------------------------------
# Optional blocks — uncomment only for the feature you are testing
# ---------------------------------------------------------------------------

